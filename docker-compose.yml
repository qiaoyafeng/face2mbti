version: "3.8"
services:
  face2mbti:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: face2mbti
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8000}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
